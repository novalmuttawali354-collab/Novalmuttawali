<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatHub - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #111114;
      --bg-tertiary: #1a1a1f;
      --bg-hover: #242429;
      --fg-primary: #f5f5f7;
      --fg-secondary: #a1a1aa;
      --fg-muted: #71717a;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --accent-glow: rgba(34, 197, 94, 0.3);
      --border: #27272a;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Background */
    .bg-gradient {
      background: 
        radial-gradient(ellipse 100% 80% at 50% -30%, rgba(34, 197, 94, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 100% 100%, rgba(34, 197, 94, 0.05) 0%, transparent 50%),
        var(--bg-primary);
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

    /* Glass */
    .glass {
      background: rgba(17, 17, 20, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Input focus */
    .input-field {
      transition: all 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px var(--accent-glow);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Login card animation */
    .login-card {
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Contact item */
    .contact-item {
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .contact-item:hover { background: var(--bg-hover); }
    .contact-item.active {
      background: var(--accent-soft);
      border-left-color: var(--accent);
    }

    /* Message bubbles */
    .message-bubble {
      max-width: 70%;
      animation: messageIn 0.25s ease;
    }
    .message-sent {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .message-received {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Status indicators */
    .status-online { background: #22c55e; box-shadow: 0 0 0 2.5px var(--bg-secondary); }
    .status-offline { background: #71717a; box-shadow: 0 0 0 2.5px var(--bg-secondary); }
    .status-away { background: #f59e0b; box-shadow: 0 0 0 2.5px var(--bg-secondary); }

    /* Typing indicator */
    .typing-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 1px;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* Badge */
    .notif-badge {
      animation: badgePulse 2s infinite;
    }
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Sidebar */
    .sidebar {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 768px) {
      .sidebar-closed { transform: translateX(-100%); }
    }

    /* Error shake */
    .shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.active {
      background: var(--accent);
    }
    .toggle.active::after {
      transform: translateX(20px);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- CHAT APP -->

            </svg>
          </button>

          </div>
        </header>

        <!-- Messages -->
        <div id="messagesArea" class="flex-1 overflow-y-auto p-4">
          <div id="welcomeScreen" class="flex items-center justify-center h-full">
            <div class="text-center">
              <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-[var(--accent-soft)] flex items-center justify-center">

        <!-- Input Area -->

          <form onsubmit="sendMessage(event)" class="flex gap-2">
            <input 
              type="text" 
              id="messageInput"

          </div>

        </div>

      <button onclick="closeSettings()" class="w-full mt-5 py-3 bg-[var(--bg-tertiary)] rounded-xl text-sm font-medium hover:bg-[var(--bg-hover)]">
        Tutup
      </button>
    </div>
  </div>

      { id: 3, name: 'Leo Sanho', email: 'leosanho.888@gmail.com', password: 'a1', avatar: 'leo' },

      { id: 9, name: 'Retna Novia', email: 'retnanovia896@gmail.com', password: 'a1', avatar: 'retna' },
    ];

    // ===== STATE =====
    let currentUser = null;
    let activeChat = null;
    let messageIdCounter = 1000;

    // ===== STORAGE HELPERS =====
    function getMessages() {
      const data = localStorage.getItem('chathub_messages');
      return data ? JSON.parse(data) : {};
    }

    function saveMessages(messages) {
      localStorage.setItem('chathub_messages', JSON.stringify(messages));
    }

    function getChatKey(user1Id, user2Id) {
      return [user1Id, user2Id].sort((a, b) => a - b).join('_');
    }

    // ===== LOGIN FUNCTIONS =====
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const password = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Memproses...';

      setTimeout(() => {
        const user = users.find(u => u.email.toLowerCase() === email && u.password === password);

        if (user) {
          currentUser = user;
          localStorage.setItem('chathub_user', JSON.stringify(user));
          showChatApp();
        } else {
          errorEl.textContent = 'Email atau password salah!';
          errorEl.classList.remove('hidden');
          document.getElementById('emailInput').classList.add('shake');
          setTimeout(() => {
            document.getElementById('emailInput').classList.remove('shake');
          }, 400);
        }

        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }, 500);
    }

    function quickLogin(email) {
      document.getElementById('emailInput').value = email;
      document.getElementById('passwordInput').value = 'a1';
    }

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function logout() {
      localStorage.removeItem('chathub_user');
      currentUser = null;
      activeChat = null;
      document.getElementById('chatApp').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('emailInput').value = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').classList.add('hidden');
    }

    // ===== CHAT APP FUNCTIONS =====
    function showChatApp() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('chatApp').classList.remove('hidden');

      // Set user info
      document.getElementById('currentUserAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.avatar}`;
      document.getElementById('currentUserName').textContent = currentUser.name;
      document.getElementById('welcomeName').textContent = currentUser.name;

      renderFriends();
      
      // Open sidebar on mobile
      if (window.innerWidth >= 768) {
        document.getElementById('sidebar').classList.remove('sidebar-closed');
      }
    }

    function renderFriends(filter = '') {
      const friends = users.filter(u => 
        u.id !== currentUser.id && 
        (u.name.toLowerCase().includes(filter.toLowerCase()) || 
         u.email.toLowerCase().includes(filter.toLowerCase()))
      );

      const messages = getMessages();

      document.getElementById('friendsList').innerHTML = friends.map(friend => {
        const chatKey = getChatKey(currentUser.id, friend.id);
        const chatMessages = messages[chatKey] || [];
        const lastMsg = chatMessages[chatMessages.length - 1];
        const unreadCount = chatMessages.filter(m => m.from === friend.id && !m.read).length;

        return `
          <div 
            class="contact-item flex items-center gap-3 px-4 py-3 cursor-pointer ${activeChat?.id === friend.id ? 'active' : ''}"
            onclick="selectFriend(${friend.id})"
          >
            <div class="relative">
              <img 
                src="https://api.dicebear.com/7.x/avataaars/svg?seed=${friend.avatar}" 
                alt="${friend.name}" 
                class="w-11 h-11 rounded-full bg-[var(--border)]"
              >
              <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full status-online"></span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <p class="font-medium text-sm truncate">${friend.name}</p>
                ${lastMsg ? `<span class="text-xs text-[var(--fg-muted)]">${lastMsg.time}</span>` : ''}
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <p class="text-xs text-[var(--fg-muted)] truncate">
                  ${lastMsg ? (lastMsg.from === currentUser.id ? 'Anda: ' : '') + lastMsg.text : 'Belum ada pesan'}
                </p>
                ${unreadCount > 0 ? `
                  <span class="notif-badge min-w-5 h-5 px-1 rounded-full bg-[var(--accent)] text-white text-xs flex items-center justify-center">
                    ${unreadCount}
                  </span>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function searchFriends() {
      const query = document.getElementById('searchInput').value;
      renderFriends(query);
    }

    function selectFriend(friendId) {
      activeChat = users.find(u => u.id === friendId);
      const friend = activeChat;

      // Mark messages as read
      const messages = getMessages();
      const chatKey = getChatKey(currentUser.id, friendId);
      if (messages[chatKey]) {
        messages[chatKey].forEach(m => {
          if (m.from === friendId) m.read = true;
        });
        saveMessages(messages);
      }

      // Update header
      document.getElementById('activeChatInfo').innerHTML = `
        <div class="flex items-center gap-3">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${friend.avatar}" alt="${friend.name}" class="w-10 h-10 rounded-full">
          <div>
            <p class="font-medium text-sm">${friend.name}</p>
            <p class="text-xs text-[var(--accent)]">Online</p>
          </div>
        </div>
      `;

      // Show chat
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('messagesList').classList.remove('hidden');
      document.getElementById('inputArea').classList.remove('hidden');

      renderMessages();
      renderFriends();

      // Close sidebar on mobile
      if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.add('sidebar-closed');
      }
    }

    function renderMessages() {
      if (!activeChat) return;

      const messages = getMessages();
      const chatKey = getChatKey(currentUser.id, activeChat.id);
      const chatMessages = messages[chatKey] || [];

      const messagesList = document.getElementById('messagesList');

      if (chatMessages.length === 0) {
        messagesList.innerHTML = `
          <div class="flex justify-center py-8">
            <p class="text-[var(--fg-muted)] text-sm">Belum ada pesan. Mulai chat sekarang!</p>
          </div>
        `;
        return;
      }

      messagesList.innerHTML = chatMessages.map(msg => {
        const isMe = msg.from === currentUser.id;
        const sender = isMe ? currentUser : activeChat;

        return `
          <div class="flex ${isMe ? 'justify-end' : 'justify-start'} items-end gap-2">
            ${!isMe ? `
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${sender.avatar}" alt="" class="w-7 h-7 rounded-full flex-shrink-0">
            ` : ''}
            <div class="message-bubble ${isMe ? 'message-sent' : 'message-received'} px-4 py-2">
              <p class="text-sm">${msg.text}</p>
              <div class="flex items-center justify-end gap-1 mt-1">
                <span class="text-xs ${isMe ? 'text-white/70' : 'text-[var(--fg-muted)]'}">${msg.time}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      messagesList.scrollTop = messagesList.scrollHeight;
    }

    function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const text = input.value.trim();

      if (!text || !activeChat) return;

      const now = new Date();
      const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

      const newMessage = {
        id: ++messageIdCounter,
        from: currentUser.id,
        to: activeChat.id,
        text: text,
        time: time,
        read: false
      };

      const messages = getMessages();
      const chatKey = getChatKey(currentUser.id, activeChat.id);

      if (!messages[chatKey]) {
        messages[chatKey] = [];
      }
      messages[chatKey].push(newMessage);
      saveMessages(messages);

      input.value = '';
      renderMessages();
      renderFriends();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('sidebar-closed');
    }

    function openSettings() {
      document.getElementById('settingsModal').classList.remove('hidden');
      document.getElementById('settingsModal').classList.add('flex');
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.add('hidden');
      document.getElementById('settingsModal').classList.remove('flex');
    }

    // ===== INIT =====
    function init() {
      // Check if user is logged in
      const savedUser = localStorage.getItem('chathub_user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showChatApp();
      }
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeSettings();
      }
    });

    // Responsive sidebar
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        document.getElementById('sidebar').classList.remove('sidebar-closed');
      }
    });

    // Start
    init();
  </script>
</body>
</html>
