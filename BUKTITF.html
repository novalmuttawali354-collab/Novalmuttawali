<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bukti Transfer Generator - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #1a1a2e; display: flex; flex-direction: row; gap: 40px; padding: 40px; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        /* Dashboard Style */
        .dashboard { background: #fff; width: 400px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dashboard h2 { font-size: 20px; margin-bottom: 20px; color: #003D79; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #003D79; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-copy { background: #34495e; }
        .btn-upload { background: #e67e22; }
        .btn-download { background: #27ae60; grid-column: span 2; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* Receipt Container */
        .preview-container { position: sticky; top: 20px; }
        
        /* Screen Area (Bukti Transfer) */
        .screen { 
            width: 375px; 
            background: url('https://i.postimg.cc/fTNyXj4L/bcayes.png') no-repeat center center; 
            background-size: 100% 100%; 
            display: flex; 
            flex-direction: column; 
            height: 812px; 
            overflow: hidden; 
            border-radius: 0; 
            box-shadow: none; 
            position: relative;
            color: #333;
        }

        /* Content Area */
        .content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 250px 20px 20px 20px; 
            text-align: center;
        }

        .status-title {
            font-size: 24px;
            font-weight: 700;
            color: #000; 
            margin-bottom: 5px;
            text-shadow: none; 
            display: none; 
        }
        
        /* Tanggal Display */
        .date-display { 
            font-size: 13px; 
            color: #000; 
            margin-bottom: 30px; 
            margin-top: 33px; 
            font-weight: 500;
            text-shadow: none;
        }
        
        /* Kartu Nominal (IDR) */
        .amount-card { 
            background: transparent; 
            width: 100%; 
            border-radius: 12px; 
            padding: 0; 
            margin-bottom: 25px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            margin-top: -25px; /* DIUBAH: Diturunkan 5px (dari -30px ke -25px) */
        }
        
        .amount-label { font-size: 13px; color: #000; text-shadow: none; margin-bottom: 5px; }
        
        .amount-value { 
            font-size: 24px; 
            font-weight: 700; 
            color: #003D79; 
            text-shadow: none; 
        }
        .amount-value .currency { 
            font-size: 24px; 
            color: #003D79; 
            margin-right: 3px; 
        }
        
        /* Kartu Detail Transaksi */
        .detail-card { 
            background: transparent; 
            width: 100%; 
            border-radius: 12px; 
            padding: 10px 0; 
            border: none;
            margin-bottom: 12px; 
            margin-top: -15px; /* DIUBAH: Dinaikkan 5px (dari -10px ke -15px) agar posisinya tetap tidak ikut turun */
        }
        
        /* Baris Detail */
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 20px 0; 
            border-bottom: none; 
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 13px; color: #000; text-shadow: none; font-weight: 400;}
        .detail-value { font-size: 13px; color: #000; font-weight: 700; text-align: right; text-shadow: none; }
        
        /* Footer / Bottom Section */
        .bottom-section { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 15px 20px 25px; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            margin-top: auto; 
        }
        
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .icon-btn:hover { background-color: rgba(255,255,255,0.5); }

        .icon-btn svg {
            width: 20px;
            height: 20px,
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .selesai-btn { flex: 1; background: #003D79; color: #fff; border: none; border-radius: 8px; font-weight: 500; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);}
        .selesai-btn:hover { background: #002a55; }
        
        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 280px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
        
        @media (max-width: 850px) {
            body { flex-direction: column; align-items: center; padding: 20px; }
            .dashboard { width: 100%; max-width: 400px; }
            .screen { width: 100%; max-width: 375px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>Editor Bukti Transfer</h2>
    <div class="form-group"><label>Jumlah (IDR)</label><input type="text" id="in_amount" placeholder="Contoh: 50.000" oninput="updateView()"></div>
    <div class="form-group"><label>Nama Penerima</label><input type="text" id="in_type" placeholder="Contoh: Transfer Online" value="Transfer Online" oninput="updateView()"></div>
    <div class="form-group"><label>Bank Tujuan</label><input type="text" id="in_name" placeholder="Contoh: BUDI SANTOSO" oninput="updateView()"></div>
    <div class="form-group"><label>No. Rekening Tujuan</label><input type="text" id="in_acc" placeholder="Contoh: 1234567890" oninput="updateView()"></div>
    <div class="form-group"><label>Waktu Transaksi</label><input type="text" id="in_time" placeholder="Contoh: 19 Apr 2024, 12:00" oninput="updateView()"></div>
    <div class="form-group"><label>Nominal</label><input type="text" id="in_ref" placeholder="Contoh: 50,,000,000" oninput="updateView()"></div>
    <div class="form-group">
        <label>Biaya</label>
        <select id="in_status" onchange="updateView()">
            <option value="IDR 6,500.00">Realtime</option>
            <option value="IDR 2,500.00">Bi-fast</option>
            <option value="Proses">Diproses</option>
        </select>
    </div>

    <div class="action-btns">
        <button class="btn btn-copy" onclick="copyToClipboard()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Salin
        </button>
        <button class="btn btn-upload" onclick="uploadFlow()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload
        </button>
        <button class="btn btn-download" onclick="downloadImage()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Simpan JPG
        </button>
    </div>
</div>

<div class="preview-container">
    <div class="screen" id="receipt">
        <!-- HEADER BIRU SUDAH DIHAPUS -->
        
        <div class="content">
            
            <!-- Tanggal -->
            <div class="date-display" id="display_time_top">19 Apr 2024, 17:59:36</div>
            
            <!-- Jumlah (IDR) -->
            <div class="amount-card">
                <div class="amount-value"><span class="currency">IDR</span><span id="display_amount">0</span></div>
            </div>
            
            <!-- Detail Transaksi -->
                     <div class="detail-card">
                <div class="detail-row"><span class="detail-label">Nama Penerima</span><span class="detail-value" id="display_type"></span></div>
                <div class="detail-row"><span class="detail-label">Bank Tujuan</span><span class="detail-value" id="display_name"></span></div>
                <div class="detail-row"><span class="detail-label">No. Rekening Tujuan</span><span class="detail-value" id="display_acc"></span></div>
                <div class="detail-row"><span class="detail-label">Waktu</span><span class="detail-value" id="display_time_bottom"></span></div>
                <div class="detail-row"><span class="detail-label">Nominal</span><span class="detail-value" id="display_ref"></span></div>
                <div class="detail-row"><span class="detail-label">Biaya</span><span class="detail-value" id="display_status_val" style="color: #000; font-weight: 700; text-shadow: none;"></span></div>
            </div>
        </div>
       
    </div>
</div>

<!-- Toast Element -->
<div id="toast">Pesan Notifikasi</div>

<script>
    // Inisialisasi data awal
    window.onload = function() {
        const now = new Date();
        const timeString = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' + now.toLocaleTimeString('id-ID');
        document.getElementById('in_time').value = timeString;
        updateView();
    };

    function updateView() {
        document.getElementById('display_type').innerText = document.getElementById('in_type').value || '-';
        document.getElementById('display_amount').innerText = document.getElementById('in_amount').value || '0';
        document.getElementById('display_name').innerText = document.getElementById('in_name').value || '-';
        document.getElementById('display_acc').innerText = document.getElementById('in_acc').value || '-';
        const timeVal = document.getElementById('in_time').value;
        document.getElementById('display_time_top').innerText = timeVal;
        document.getElementById('display_time_bottom').innerText = timeVal;
        document.getElementById('display_ref').innerText = document.getElementById('in_ref').value || '-';
        
        const status = document.getElementById('in_status').value;
        document.getElementById('display_status_val').innerText = status;
        
        const statusTitle = document.getElementById('display_status_title');
        if(statusTitle) {
            statusTitle.innerText = "Transfer " + status;
        }
    }

    // Fungsi Toast Notification
    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.className = "show";
        toast.innerText = message;
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    async function copyToClipboard() {
        try {
            const element = document.getElementById('receipt');
            const canvas = await html2canvas(element, { 
                scale: 2, 
                useCORS: true,
                backgroundColor: null
            });
            canvas.toBlob(blob => {
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]).then(() => {
                    showToast("✅ Gambar berhasil disalin! Silakan Paste (Ctrl+V).");
                });
            });
        } catch (err) {
            console.error(err);
            showToast("❌ Gagal menyalin gambar.");
        }
    }

    async function uploadFlow() {
        await copyToClipboard();
        showToast("🚀 Membuka Sleekshot... Paste di sana.");
        setTimeout(() => {
            window.open('https://prnt.sc/', '_blank');
        }, 1000);
    }

    function downloadImage() {
        const element = document.getElementById('receipt');
        html2canvas(element, { 
            scale: 2,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Bukti_Transfer.jpg';
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
            showToast("⬇️ Mengunduh gambar...");
        });
    }
</script>
</body>
</html>
