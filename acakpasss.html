<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(10,10,18,0.68);
      --border: rgba(255,190,60,0.12);
      --fg: #f5f0e8;
      --muted: #9a8e7d;
      --accent: #f5b731;
      --accent2: #ff6a2f;
      --accent-glow: rgba(245,183,49,0.25);
      --success: #3ddc84;
      --field-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,200,60,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== BACKGROUND GIF ===== */
    .bg-gif {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('https://cdn.areabermain.club/assets/cdn/az6/2026/02/23/20260223/a603c87382dadbc574848a0e4530b6c0/gif-promosi-markaswd-7.gif') center/cover no-repeat;
    }

    /* Overlay dipersenang — GIF lebih terlihat */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: 
        radial-gradient(ellipse at 50% 30%, rgba(10,10,15,0.15) 0%, rgba(10,10,15,0.55) 70%),
        linear-gradient(180deg, rgba(10,10,15,0.1) 0%, rgba(10,10,15,0.6) 100%);
      pointer-events: none;
    }

    /* Vignette dikurangi intensitasnya */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(5,5,10,0.45) 100%);
      pointer-events: none;
    }

    /* Scanline tipis */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.025) 2px,
        rgba(0,0,0,0.025) 4px
      );
      pointer-events: none;
    }

    /* ===== CANVAS PARTICLES ===== */
    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    /* ===== AMBIENT GLOW ===== */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 3;
    }
    .ambient.a1 {
      width: 500px; height: 500px;
      background: rgba(245,183,49,0.12);
      top: -15%; left: -10%;
      animation: ambDrift 14s ease-in-out infinite alternate;
    }
    .ambient.a2 {
      width: 400px; height: 400px;
      background: rgba(255,106,47,0.1);
      bottom: -15%; right: -10%;
      animation: ambDrift 14s ease-in-out infinite alternate-reverse;
    }

    @keyframes ambDrift {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,30px) scale(1.2); }
    }

    /* ===== MAIN CARD ===== */
    .card-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      margin: 16px;
      animation: cardReveal 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardReveal {
      0% { opacity: 0; transform: translateY(70px) scale(0.9); filter: blur(10px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Card outer neon glow border */
    .card-wrapper::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      background: linear-gradient(
        160deg,
        rgba(245,183,49,0.5),
        rgba(255,106,47,0.2),
        transparent 50%,
        rgba(245,183,49,0.1),
        rgba(255,106,47,0.3)
      );
      z-index: -1;
      animation: borderGlow 4s ease-in-out infinite alternate;
    }

    @keyframes borderGlow {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* Card outer soft shadow */
    .card-wrapper::after {
      content: '';
      position: absolute;
      inset: -40px;
      border-radius: 50px;
      background: radial-gradient(ellipse at center, rgba(245,183,49,0.1), transparent 70%);
      z-index: -2;
      animation: shadowPulse 4s ease-in-out infinite alternate;
    }

    @keyframes shadowPulse {
      0% { opacity: 0.5; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1.02); }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(50px) saturate(1.6);
      -webkit-backdrop-filter: blur(50px) saturate(1.6);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    /* ===== TOP SHIMMER ===== */
    .shimmer-bar {
      height: 3px;
      background: linear-gradient(90deg, transparent 10%, var(--accent), var(--accent2), var(--accent), transparent 90%);
      background-size: 300% 100%;
      animation: shimmerSlide 2.5s linear infinite;
    }

    @keyframes shimmerSlide {
      0% { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }

    .card-inner {
      padding: 44px 38px 38px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .shield-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .shield-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow), transparent 65%);
      animation: shieldBreath 3.5s ease-in-out infinite alternate;
    }

    @keyframes shieldBreath {
      0% { opacity: 0.4; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .shield-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 74px; height: 74px;
      border-radius: 22px;
      background: linear-gradient(145deg, var(--accent), var(--accent2));
      box-shadow:
        0 10px 40px var(--accent-glow),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .shield-icon i { font-size: 32px; color: #fff; }

    .orbit-ring {
      position: absolute;
      inset: -28px;
      border: 1.5px dashed rgba(245,183,49,0.25);
      border-radius: 50%;
      animation: orbitSpin 10s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -5px; left: 50%;
      width: 10px; height: 10px;
      margin-left: -5px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(61,220,132,0.8);
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--fg) 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    .header .sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* ===== INFO BLOCK ===== */
    .info-block {
      position: relative;
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .info-block::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,183,49,0.3), transparent);
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-radius: 14px;
      transition: background 0.3s ease;
    }

    .info-row:hover {
      background: rgba(245,183,49,0.04);
    }

    .info-row .row-icon {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      flex-shrink: 0;
      font-size: 16px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .info-row:hover .row-icon {
      transform: scale(1.1);
    }

    .info-row.user-row .row-icon {
      background: rgba(245,183,49,0.1);
      color: var(--accent);
      box-shadow: 0 0 0 0 rgba(245,183,49,0);
    }
    .info-row.user-row:hover .row-icon {
      box-shadow: 0 0 15px rgba(245,183,49,0.2);
    }

    .info-row.pass-row .row-icon {
      background: rgba(61,220,132,0.1);
      color: var(--success);
      box-shadow: 0 0 0 0 rgba(61,220,132,0);
    }
    .info-row.pass-row:hover .row-icon {
      box-shadow: 0 0 15px rgba(61,220,132,0.2);
    }

    .info-row .row-content {
      flex: 1;
      min-width: 0;
    }

    .info-row .row-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .info-row .row-value {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--fg);
      background: none;
      border: none;
      outline: none;
      width: 100%;
      padding: 0;
      cursor: text;
    }

    .info-row .row-value.pass-val {
      font-family: 'JetBrains Mono', monospace;
      color: var(--success);
      letter-spacing: 5px;
      font-size: 22px;
      font-weight: 600;
      text-shadow: 0 0 25px rgba(61,220,132,0.4);
    }

    .info-row .row-value::placeholder {
      color: #3a3530;
      letter-spacing: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 300;
    }

    .info-divider {
      height: 1px;
      margin: 0 24px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ===== STRENGTH BAR ===== */
    .strength-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    .strength-dots {
      display: flex;
      gap: 5px;
    }

    .strength-dots .dot {
      width: 28px; height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .strength-dots .dot.active {
      background: var(--success);
      box-shadow: 0 0 12px rgba(61,220,132,0.5);
    }

    .strength-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      transition: color 0.3s;
    }

    .strength-label.strong { color: var(--success); text-shadow: 0 0 8px rgba(61,220,132,0.4); }
    .strength-label.medium { color: var(--accent); text-shadow: 0 0 8px rgba(245,183,49,0.4); }
    .strength-label.weak { color: var(--accent2); text-shadow: 0 0 8px rgba(255,106,47,0.4); }

    /* ===== MESSAGE AREA ===== */
    .msg-area {
      margin-bottom: 32px;
    }

    .msg-card {
      padding: 16px 18px;
      border-radius: 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
      backdrop-filter: blur(10px);
    }

    .msg-card:hover {
      transform: translateX(6px);
    }

    .msg-card.main-msg {
      background: linear-gradient(135deg, rgba(61,220,132,0.08), rgba(61,220,132,0.02));
      border: 1px solid rgba(61,220,132,0.15);
    }
    .msg-card.main-msg:hover {
      box-shadow: 0 0 20px rgba(61,220,132,0.1);
    }

    .msg-card.note-msg {
      background: linear-gradient(135deg, rgba(245,183,49,0.08), rgba(245,183,49,0.02));
      border: 1px solid rgba(245,183,49,0.12);
    }
    .msg-card.note-msg:hover {
      box-shadow: 0 0 20px rgba(245,183,49,0.1);
    }

    .msg-card .msg-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    .msg-card.main-msg .msg-icon {
      background: rgba(61,220,132,0.15);
      color: var(--success);
    }

    .msg-card.note-msg .msg-icon {
      background: rgba(245,183,49,0.15);
      color: var(--accent);
    }

    .msg-card .msg-text {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--fg);
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .msg-card.note-msg .msg-text {
      color: var(--muted);
      font-weight: 400;
    }

    .msg-card .msg-text .label-tag {
      font-weight: 800;
      color: var(--accent);
    }

    /* ===== BUTTONS ===== */
    .btn-row {
      display: flex;
      gap: 14px;
    }

    .btn {
      flex: 1;
      padding: 17px 16px;
      border: none;
      border-radius: 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s;
    }
    .btn:hover::after { left: 100%; }

    .btn:active { transform: scale(0.96) !important; }

    .btn-copy {
      background: linear-gradient(145deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .btn-copy:hover {
      box-shadow: 0 12px 40px rgba(245,183,49,0.45);
      transform: translateY(-3px);
    }

    .btn-regen {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--fg);
    }

    .btn-regen:hover {
      border-color: var(--accent);
      background: rgba(245,183,49,0.08);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(245,183,49,0.15);
    }

    .btn-regen i {
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    }

    .btn-regen:hover i {
      transform: rotate(180deg);
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(10,10,18,0.95);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transform: translateX(130%);
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
      font-size: 14px;
      font-weight: 600;
    }

    .toast.show { transform: translateX(0); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.success i { color: var(--success); font-size: 20px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .card-inner { padding: 36px 24px 32px; }
      .info-row { padding: 14px 16px; gap: 10px; }
      .btn-row { flex-direction: column; }
      .header h1 { font-size: 24px; }
      .info-row .row-value.pass-val { font-size: 18px; letter-spacing: 4px; }
      .shield-icon { width: 60px; height: 60px; }
      .shield-icon i { font-size: 26px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-gif"></div>
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>
  <div class="scanlines"></div>
  <div class="ambient a1"></div>
  <div class="ambient a2"></div>

  <!-- Canvas Particles -->
  <canvas id="particleCanvas"></canvas>

  <!-- Main Card -->
  <div class="card-wrapper">
    <div class="card">
      <div class="shimmer-bar"></div>
      <div class="card-inner">

        <!-- Header -->
        <div class="header">
          <div class="shield-wrap">
            <div class="shield-icon">
              <i class="fas fa-fingerprint"></i>
            </div>
            <div class="orbit-ring"></div>
          </div>
          <h1>Secure Credentials</h1>
          <p class="sub">Password otomatis 6 karakter huruf & angka</p>
        </div>

        <!-- Info Block -->
        <div class="info-block">
          <div class="info-row user-row">
            <div class="row-icon"><i class="fas fa-user"></i></div>
            <div class="row-content">
              <div class="row-label">User Id</div>
              <input type="text" class="row-value" id="userId" placeholder="Masukkan User Id" aria-label="User Id" autocomplete="off">
            </div>
          </div>
          <div class="info-divider"></div>
          <div class="info-row pass-row">
            <div class="row-icon"><i class="fas fa-lock"></i></div>
            <div class="row-content">
              <div class="row-label">Password</div>
              <span class="row-value pass-val" id="passwordDisplay">&bull;&bull;&bull;&bull;&bull;&bull;</span>
            </div>
          </div>
        </div>

        <!-- Strength Indicator -->
        <div class="strength-bar">
          <div class="strength-dots">
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
            <div class="dot" id="dot5"></div>
          </div>
          <span class="strength-label" id="strengthLabel">Menunggu</span>
        </div>

        <!-- Messages -->
        <div class="msg-area">
          <div class="msg-card main-msg">
            <div class="msg-icon"><i class="fas fa-circle-check"></i></div>
            <div class="msg-text">Silahkan di coba login ya bosku. Terima Kasih</div>
          </div>
          <div class="msg-card note-msg">
            <div class="msg-icon"><i class="fas fa-bookmark"></i></div>
            <div class="msg-text"><span class="label-tag">Note :</span> Saran kami di simpan di memo anda.</div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
          <button type="button" class="btn btn-copy" id="btnCopy" aria-label="Salin Semua">
            <i class="fas fa-copy"></i> Salin Semua
          </button>
          <button type="button" class="btn btn-regen" id="btnRegen" aria-label="Acak Ulang">
            <i class="fas fa-arrows-rotate"></i> Acak Ulang
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // === DOM Elements ===
    const userIdInput = document.getElementById('userId');
    const passwordDisplay = document.getElementById('passwordDisplay');
    const btnCopy = document.getElementById('btnCopy');
    const btnRegen = document.getElementById('btnRegen');
    const strengthLabel = document.getElementById('strengthLabel');
    const dots = [
      document.getElementById('dot1'),
      document.getElementById('dot2'),
      document.getElementById('dot3'),
      document.getElementById('dot4'),
      document.getElementById('dot5')
    ];

    let currentPassword = '';

    // === Generate Password ===
    function generatePassword() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
      const digits = '0123456789';
      const all = letters + digits;

      let pass = '';
      pass += letters[Math.floor(Math.random() * letters.length)];
      pass += digits[Math.floor(Math.random() * digits.length)];

      for (let i = 0; i < 4; i++) {
        pass += all[Math.floor(Math.random() * all.length)];
      }

      return pass.split('').sort(() => Math.random() - 0.5).join('');
    }

    // === Scramble Text Animation ===
    function animatePassword(finalPass) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let iteration = 0;

      const interval = setInterval(() => {
        passwordDisplay.textContent = finalPass
          .split('')
          .map((char, i) => {
            if (i < iteration) return finalPass[i];
            return chars[Math.floor(Math.random() * chars.length)];
          })
          .join('');

        iteration += 0.6;

        if (iteration >= finalPass.length) {
          clearInterval(interval);
          passwordDisplay.textContent = finalPass;
          currentPassword = finalPass;
          updateStrength();
        }
      }, 40);
    }

    // === Strength Indicator ===
    function updateStrength() {
      if (!currentPassword) {
        dots.forEach(d => d.classList.remove('active'));
        strengthLabel.textContent = 'Menunggu';
        strengthLabel.className = 'strength-label';
        return;
      }

      const unique = new Set(currentPassword.split('')).size;
      const hasUpper = /[A-Z]/.test(currentPassword);
      const hasLower = /[a-z]/.test(currentPassword);
      const hasDigit = /[0-9]/.test(currentPassword);

      let score = 0;
      if (hasUpper) score++;
      if (hasLower) score++;
      if (hasDigit) score++;
      if (unique >= 4) score++;
      if (unique >= 5) score++;

      dots.forEach((d, i) => {
        d.classList.toggle('active', i < score);
      });

      if (score >= 4) {
        strengthLabel.textContent = 'Kuat';
        strengthLabel.className = 'strength-label strong';
      } else if (score >= 3) {
        strengthLabel.textContent = 'Cukup';
        strengthLabel.className = 'strength-label medium';
      } else {
        strengthLabel.textContent = 'Lemah';
        strengthLabel.className = 'strength-label weak';
      }
    }

    // === Format Text for Copy ===
    function buildCopyText() {
      const uid = userIdInput.value.trim() || '(belum diisi)';
      const pwd = currentPassword || '(belum di-generate)';
      return `User Id : ${uid}\nPassword : ${pwd}\nSilahkan di coba login ya bosku. Terima Kasih\nNote : Saran kami di simpan di memo anda.`;
    }

    // === Toast Notification ===
    function showToast(message) {
      const container = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast success';
      t.innerHTML = `<i class="fas fa-circle-check"></i><span>${message}</span>`;
      container.appendChild(t);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => { t.classList.add('show'); });
      });

      setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => t.remove(), 600);
      }, 3000);
    }

    // === Event: Acak Ulang ===
    btnRegen.addEventListener('click', () => {
      const newPass = generatePassword();
      animatePassword(newPass);

      const icon = btnRegen.querySelector('i');
      icon.style.transform = 'rotate(360deg)';
      setTimeout(() => { icon.style.transform = ''; }, 600);
    });

    // === Event: Salin Semua ===
    btnCopy.addEventListener('click', () => {
      if (!currentPassword) {
        const newPass = generatePassword();
        animatePassword(newPass);
        showToast('Password baru di-generate, coba salin lagi');
        return;
      }

      const text = buildCopyText();

      navigator.clipboard.writeText(text).then(() => {
        showToast('Semua data berhasil disalin!');
        const icon = btnCopy.querySelector('i');
        icon.className = 'fas fa-check';
        setTimeout(() => { icon.className = 'fas fa-copy'; }, 1500);
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed;opacity:0;left:-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('Semua data berhasil disalin!');
      });
    });

    // === Auto-generate on Load ===
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const pass = generatePassword();
        animatePassword(pass);
      }, 800);
    });

    // === CANVAS INTERACTIVE PARTICLES ===
    (function() {
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let mouse = { x: -9999, y: -9999 };

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      resize();
      window.addEventListener('resize', resize);

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      const PARTICLE_COUNT = 70;
      const particles = [];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 2 + 0.5,
          color: Math.random() > 0.6
            ? `rgba(245,183,49,${0.4 + Math.random() * 0.4})`
            : `rgba(255,255,255,${0.1 + Math.random() * 0.15})`
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            const force = (130 - dist) / 130 * 0.025;
            p.vx += dx * force;
            p.vy += dy * force;
          }

          const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
          if (speed > 2) {
            p.vx *= 0.97;
            p.vy *= 0.97;
          }

          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            const ddx = p.x - p2.x;
            const ddy = p.y - p2.y;
            const dd = Math.sqrt(ddx * ddx + ddy * ddy);
            if (dd < 120) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(245,183,49,${0.08 * (1 - dd / 120)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      draw();
    })();
  </script>
