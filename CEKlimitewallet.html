<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet Recapper</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1e293b;
            --text-muted: #475569;
            --text-light: #f8fafc;
            --dana: #108ee9;
            --linkaja: #e53935;
            --ovo: #4c3494;
            --gopay: #00aed6;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Background Image */
            background-image: url('https://i0.wp.com/esportsnesia.com/wp-content/uploads/2024/02/2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Soft dark overlay to make white text/glass pop slightly better without being dark */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(0,0,0,0.4));
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-light);
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            color: var(--text-light);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Paste Area */
        .paste-wrapper {
            position: relative;
            margin-bottom: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .paste-wrapper:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }

        .paste-area {
            width: 100%;
            height: 120px;
            padding: 15px;
            background: rgba(255,255,255,0.6);
            border: 1px dashed rgba(0,0,0,0.15);
            border-radius: 16px;
            color: var(--text-dark);
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        .paste-area:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.8);
        }

        .paste-area::placeholder {
            color: rgba(0,0,0,0.4);
            text-align: center;
            padding-top: 20px;
        }

        /* Results Grid */
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 28px;
            border-radius: 24px;
            backdrop-filter: blur(20px) saturate(180%);
            position: relative;
            overflow: hidden;
            transform: translateY(30px) scale(0.95);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card.active {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Glow effect under cards */
        .card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 6px;
            opacity: 0.8;
            filter: blur(8px);
            transition: height 0.3s;
        }
        .card:hover::after { height: 10px; filter: blur(12px); }

        .card.dana::after { background: var(--dana); box-shadow: 0 5px 15px var(--dana); }
        .card.linkaja::after { background: var(--linkaja); box-shadow: 0 5px 15px var(--linkaja); }
        .card.ovo::after { background: var(--ovo); box-shadow: 0 5px 15px var(--ovo); }
        .card.gopay::after { background: var(--gopay); box-shadow: 0 5px 15px var(--gopay); }
        .card.total::after { background: var(--gold); box-shadow: 0 5px 15px var(--gold); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.5);
        }
        
        .card.dana .card-icon { color: var(--dana); }
        .card.linkaja .card-icon { color: var(--linkaja); }
        .card.ovo .card-icon { color: var(--ovo); }
        .card.gopay .card-icon { color: var(--gopay); }

        .card h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card .amount {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .card .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: width 1.5s ease-out;
        }

        .card.dana .progress-fill { background: var(--dana); }
        .card.linkaja .progress-fill { background: var(--linkaja); }
        .card.ovo .progress-fill { background: var(--ovo); }
        .card.gopay .progress-fill { background: var(--gopay); }

        /* Grand Total Card */
        .card.total {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            padding: 40px 28px;
        }

        .card.total h3 {
            font-size: 1.2rem;
            color: #b45309; /* Darker gold for readability */
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .card.total .amount {
            font-size: 3.5rem;
            background: linear-gradient(to right, #b45309, #d97706, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-clear {
            display: block;
            margin: 0 auto;
            padding: 14px 35px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9)); }
        .toast.warning { background: linear-gradient(135deg, rgba(245, 158, 11, 0.9), rgba(217, 119, 6, 0.9)); color: #1e293b; }

        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .card.total .amount { font-size: 2.5rem; }
            .card .amount { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="date-badge">
                <i class="fa-regular fa-calendar-check"></i>
                <span id="todayDate"></span>
            </div>
            <h1>E-Wallet Recapper</h1>
            <p>Sistem hanya merekap transaksi yang terjadi pada hari ini.</p>
        </header>

        <div class="paste-wrapper">
            <textarea id="pasteArea" class="paste-area" placeholder="Klik di sini, lalu Paste (Ctrl+V) data tabel dari sistem Anda...&#10;Data tanggal kemarin/berikutnya akan otomatis diabaikan."></textarea>
        </div>

        <div class="results" id="results">
            <div class="card dana" id="card-dana">
                <div class="card-header">
                    <h3>Dana</h3>
                    <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
                </div>
                <p class="amount" id="total-dana">0,00</p>
                <p class="count" id="count-dana">0 transaksi</p>
                <div class="progress-track"><div class="progress-fill" id="progress-dana"></div></div>
            </div>

            <div class="card linkaja" id="card-linkaja">
                <div class="card-header">
                    <h3>LinkAja</h3>
                    <div class="card-icon"><i class="fa-solid fa-bolt"></i></div>
                </div>
                <p class="amount" id="total-linkaja">0,00</p>
                <p class="count" id="count-linkaja">0 transaksi</p>
                <div class="progress-track"><div class="progress-fill" id="progress-linkaja"></div></div>
            </div>

            <div class="card ovo" id="card-ovo">
                <div class="card-header">
                    <h3>Ovo</h3>
                    <div class="card-icon"><i class="fa-solid fa-circle-notch"></i></div>
                </div>
                <p class="amount" id="total-ovo">0,00</p>
                <p class="count" id="count-ovo">0 transaksi</p>
                <div class="progress-track"><div class="progress-fill" id="progress-ovo"></div></div>
            </div>

            <div class="card gopay" id="card-gopay">
                <div class="card-header">
                    <h3>Gopay</h3>
                    <div class="card-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                </div>
                <p class="amount" id="total-gopay">0,00</p>
                <p class="count" id="count-gopay">0 transaksi</p>
                <div class="progress-track"><div class="progress-fill" id="progress-gopay"></div></div>
            </div>
            
            <div class="card total" id="card-total">
                <h3>Total E-Wallet Hari Ini</h3>
                <p class="amount" id="total-all">0,00</p>
            </div>
        </div>

        <button class="btn-clear" onclick="clearData()"><i class="fa-solid fa-rotate-left"></i> Reset Data</button>
    </div>

    <div id="toast" class="toast"></div>

<script>
    // Set today's date on the badge
    const today = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('todayDate').innerText = today.toLocaleDateString('id-ID', options);

    const pasteArea = document.getElementById('pasteArea');
    
    const formatRupiah = (amount) => {
        return new Intl.NumberFormat('id-ID', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(amount);
    };

    // Toast Notification function
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.className = `toast ${type}`;
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    // Counting Up Animation
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        const range = end - start;
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            // Ease out cubic
            const value = start + range * (1 - Math.pow(1 - progress, 3));
            obj.innerText = formatRupiah(value);
            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                obj.innerText = formatRupiah(end);
            }
        }
        requestAnimationFrame(update);
    }

    pasteArea.addEventListener('paste', () => {
        setTimeout(() => { processData(); }, 100);
    });

    function showCards() {
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, index) => {
            setTimeout(() => { card.classList.add('active'); }, 150 * index);
        });
    }

    function processData() {
        const text = pasteArea.value;
        if (!text.trim()) return;

        const lines = text.split('\n');
        
        let bankCodeIndex = -1;
        let debitIndex = -1;
        let transferTimeIndex = -1;
        
        const wallets = {
            'DANA': { total: 0, count: 0 },
            'LINKAJA': { total: 0, count: 0 },
            'OVO': { total: 0, count: 0 },
            'GOPAY': { total: 0, count: 0 }
        };

        // Get today's date components for comparison
        const currentDay = today.getDate();
        const currentMonth = today.getMonth() + 1; // JS months are 0-indexed
        const currentYear = today.getFullYear();

        let isToday = false;
        let ewalletFound = false;

        for (let i = 0; i < lines.length; i++) {
            const cols = lines[i].split('\t').map(col => col.trim());

            // Find Header Indices
            if (cols.includes('Bank Code') && cols.includes('Debit') && cols.includes('Transfer Time')) {
                bankCodeIndex = cols.indexOf('Bank Code');
                debitIndex = cols.indexOf('Debit');
                transferTimeIndex = cols.indexOf('Transfer Time');
                continue; 
            }

            // Process Data Rows
            if (bankCodeIndex !== -1 && cols.length > Math.max(bankCodeIndex, debitIndex, transferTimeIndex)) {
                const bankCode = cols[bankCodeIndex].toUpperCase();
                
                // Check if e-wallet
                if (wallets.hasOwnProperty(bankCode)) {
                    ewalletFound = true;
                    
                    // Date Validation (Filter Hari Ini)
                    isToday = false; // Reset flag
                    const timeStr = cols[transferTimeIndex];
                    
                    if (timeStr) {
                        const datePart = timeStr.split(' ')[0];
                        const dateParts = datePart.split('/');
                        
                        if(dateParts.length === 3) {
                            const day = parseInt(dateParts[0], 10);
                            const month = parseInt(dateParts[1], 10);
                            const year = parseInt(dateParts[2], 10);
                            
                            if (day === currentDay && month === currentMonth && year === currentYear) {
                                isToday = true;
                            }
                        }
                    }

                    // If transaction is today, sum it!
                    if (isToday) {
                        const debitStr = cols[debitIndex];
                        const debitNum = parseFloat(debitStr.replace(/,/g, '')) || 0;
                        
                        wallets[bankCode].total += debitNum;
                        wallets[bankCode].count += 1;
                    }
                }
            }
        }

        if(!ewalletFound) {
            showToast('Tidak ada E-Wallet terdeteksi pada data!', 'warning');
            return;
        }

        let grandTotal = 0;
        let hasTodayTransaction = false;

        // Update UI & Animation
        for (const [key, value] of Object.entries(wallets)) {
            const keyLower = key.toLowerCase();
            
            animateValue(`total-${keyLower}`, 0, value.total, 1500);
            document.getElementById(`count-${keyLower}`).innerText = `${value.count} transaksi`;
            
            grandTotal += value.total;
            if(value.count > 0) hasTodayTransaction = true;
        }

        animateValue('total-all', 0, grandTotal, 2000);

        // Animate Progress Bars
        setTimeout(() => {
            for (const [key, value] of Object.entries(wallets)) {
                const keyLower = key.toLowerCase();
                const percent = grandTotal > 0 ? (value.total / grandTotal) * 100 : 0;
                document.getElementById(`progress-${keyLower}`).style.width = `${percent}%`;
            }
        }, 300);

        showCards();

        if(hasTodayTransaction) {
            showToast('Rekap hari ini berhasil dibuat!', 'success');
        } else {
            showToast('Tidak ada transaksi E-Wallet hari ini.', 'warning');
        }
    }

    function clearData() {
        pasteArea.value = '';
        const wallets = ['dana', 'linkaja', 'ovo', 'gopay'];
        wallets.forEach(w => {
            document.getElementById(`total-${w}`).innerText = '0,00';
            document.getElementById(`count-${w}`).innerText = '0 transaksi';
            document.getElementById(`progress-${w}`).style.width = '0%';
            document.getElementById(`card-${w}`).classList.remove('active');
        });
        document.getElementById('total-all').innerText = '0,00';
        document.getElementById('card-total').classList.remove('active');
    }
</script>

</body>
</html>
