<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --success: #00ff94;
            --danger: #ff4757;
            --text-main: #ffffff;
            --text-muted: #a0a0c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1), 0 0 80px rgba(188, 19, 254, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-section {
            margin-bottom: 25px;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-main);
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-process {
            background: linear-gradient(135deg, var(--primary), #00b8d4);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
        }

        .btn-process:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 243, 255, 0.5);
        }

        .btn-copy {
            background: linear-gradient(135deg, var(--success), #00cc76);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 148, 0.3);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 148, 0.5);
        }

        .btn-clear {
            flex: 0.4;
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-clear:hover {
            background: var(--danger);
            color: #fff;
        }

        .result-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-label i {
            color: var(--secondary);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        thead th {
            background: rgba(188, 19, 254, 0.2);
            color: var(--primary);
            padding: 16px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--secondary);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(0, 243, 255, 0.05);
        }

        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        tbody td:last-child {
            color: var(--success);
            font-weight: 700;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        .empty-state span {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* Hidden textarea for raw copy data */
        #rawData { display: none; }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .data-row {
            animation: fadeIn 0.3s ease forwards;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DATA EXTRACTOR PRO</h1>
        <p>Tempel data mentah, sistem akan mengekstrak dan menyusun kolom secara otomatis</p>
    </div>

    <div class="input-section">
        <textarea id="inputData" placeholder="Tempel data mentah dari website di sini... (Ctrl+V)"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-process" onclick="processData()">⚡ Proses Data</button>
        <button class="btn-copy" onclick="copyResult()">📋 Salin Hasil (Excel)</button>
        <button class="btn-clear" onclick="clearData()">✕ Hapus</button>
    </div>

    <div class="result-label">
        <span>📊 Hasil Ekstraksi</span>
    </div>

    <div class="table-wrapper">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Bank Name</th>
                    <th>Account No</th>
                    <th>Member Code</th>
                    <th>Account Name</th>
                    <th>Net Amount</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" class="empty-state">
                        <span>🕳️</span>
                        Belum ada data yang diproses
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <textarea id="rawData"></textarea>
</div>

<script>
    function processData() {
        const inputText = document.getElementById('inputData').value;
        const tableBody = document.getElementById('tableBody');
        const rawData = document.getElementById('rawData');

        if (!inputText.trim()) {
            alert("Silakan tempel data terlebih dahulu!");
            return;
        }

        // Regex yang sangat ketat hanya untuk baris transaksi
        // Struktur: STATUS MEMBER_CODE ACCOUNT_NO ACCOUNT_NAME NET_AMOUNT AREA_CODE BANK_NAME ...sisanya diabaikan
        const regex = /(?:PENDING|PROCESS|APPROVED|REJECTED)\s+([^\s]+)\s+([^\s]+)\s+(.+?)\s+(\d{1,3}(?:,\d{3})*\.\d{2})\s+[^\s]+\s+([^\s]+)/g;
        
        let match;
        let rowsHTML = '';
        let rawCopyText = '';
        let dataFound = false;

        while ((match = regex.exec(inputText)) !== null) {
            dataFound = true;
            let memberCode = match[1].trim();
            let accountNo = match[2].trim();
            let accountName = match[3].trim();
            let netAmount = match[4].trim();
            let bankName = match[5].trim();

            // Format untuk disalin ke Excel (Pemisah Tab)
            rawCopyText += `${bankName}\t${accountNo}\t${memberCode}\t${accountName}\t${netAmount}\n`;

            // Format untuk Tampilan Tabel Web
            rowsHTML += `
                <tr class="data-row">
                    <td>${bankName}</td>
                    <td>${accountNo}</td>
                    <td>${memberCode}</td>
                    <td>${accountName}</td>
                    <td>${netAmount}</td>
                </tr>
            `;
        }

        if (dataFound) {
            tableBody.innerHTML = rowsHTML;
            rawData.value = rawCopyText.trim();
        } else {
            tableBody.innerHTML = `<tr><td colspan="5" class="empty-state"><span>⚠️</span>Data transaksi tidak ditemukan. Pastikan format sesuai.</td></tr>`;
            rawData.value = '';
        }
    }

    function copyResult() {
        const rawData = document.getElementById('rawData');
        if (!rawData.value) {
            alert("Tidak ada data untuk disalin! Klik 'Proses Data' terlebih dahulu.");
            return;
        }

        navigator.clipboard.writeText(rawData.value).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ Berhasil Disalin!";
            btn.style.background = "linear-gradient(135deg, #6600ff, #bc13fe)";
            btn.style.color = "#fff";
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = "";
                btn.style.color = "";
            }, 2000);
        }).catch(err => {
            rawData.style.display = 'block';
            rawData.select();
            document.execCommand('copy');
            rawData.style.display = 'none';
            alert("Hasil berhasil disalin!");
        });
    }

    function clearData() {
        document.getElementById('inputData').value = '';
        document.getElementById('rawData').value = '';
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="empty-state"><span>🕳️</span>Belum ada data yang diproses</td></tr>`;
    }
</script>

</body>
</html>
