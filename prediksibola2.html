<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Bola - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{
            --bg:#0b0a07;--bg2:#12100b;--bg3:#1a1710;
            --card:#15120d;--card2:#1e1b14;--card3:#262218;
            --brd:#2e2818;--brd2:#3d3520;--brd3:#50462c;
            --fg:#f2ecd8;--fg2:#d8d0b0;--fg3:#b8ac88;
            --fm:#7a6f55;--fm2:#5c5440;
            --yl:#f5c518;--yl2:#ffe04a;--yl3:#b8920a;
            --yld:rgba(245,197,24,.06);--yld2:rgba(245,197,24,.12);
            --ylg:rgba(245,197,24,.3);
            --gy:#8a7f6e;--gn:#3cb86a;--gnd:rgba(60,184,106,.12);
            --rd:#e05545;--rdd:rgba(224,85,69,.12);
            --bl:#3b8ef5;--bl2:#6ab0ff;--bl3:#1a6fd4;
            --bld:rgba(59,142,245,.06);--bld2:rgba(59,142,245,.12);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

        .atm{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .atm .orb{position:absolute;border-radius:50%;filter:blur(140px)}
        .atm .o1{width:600px;height:600px;top:-20%;left:-10%;background:rgba(245,197,24,.025);animation:dr 25s ease-in-out infinite}
        .atm .o2{width:450px;height:450px;bottom:-10%;right:-8%;background:rgba(59,142,245,.02);animation:dr 30s ease-in-out infinite reverse}
        @keyframes dr{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(70px,40px) scale(1.12)}70%{transform:translate(-40px,70px) scale(.9)}}

        /* Bola jatuh canvas */
        #ballCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

        .grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.014;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

        .wrap{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:12px 14px 60px}

        /* ===== HEADER ===== */
        header{text-align:center;padding:24px 0 20px}
        .logo-wrap{margin-bottom:18px}
        .logo-wrap img{height:72px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 12px rgba(245,197,24,.15));transition:transform .3s}
        .logo-wrap img:hover{transform:scale(1.04)}
        .hbadge{display:inline-flex;align-items:center;gap:7px;background:var(--yld2);border:2px solid rgba(245,197,24,.18);color:var(--yl);font-size:10px;font-weight:800;padding:5px 16px;border-radius:50px;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:14px}
        .hbadge .pd{width:6px;height:6px;background:var(--yl);border-radius:50%;animation:pls 1.5s ease-in-out infinite}
        @keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.12;transform:scale(.2)}}
        header h1{font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:-2.5px;line-height:1.05;margin-bottom:6px}
        header h1 .hl{background:linear-gradient(135deg,var(--yl),var(--yl2),var(--yl3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        header p{color:var(--fm);font-size:13px;font-weight:400;letter-spacing:.2px}

        /* ===== TABS ===== */
        .tab-wrap{margin-bottom:16px}
        .tab-bar{display:flex;gap:4px;background:var(--card);border:2px solid var(--brd2);border-radius:14px;padding:5px}
        .tab-btn{
            flex:1;display:flex;align-items:center;justify-content:center;gap:9px;
            padding:14px 18px;border:none;border-radius:10px;
            background:transparent;color:var(--fm);
            font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;
            cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;
            letter-spacing:-.2px;
        }
        .tab-btn i{font-size:16px;transition:all .35s}
        .tab-btn:hover{color:var(--fg2)}
        .tab-btn.t-active-jadwal{
            background:linear-gradient(135deg,var(--bld2),var(--bld));
            color:var(--bl);box-shadow:0 4px 20px rgba(59,142,245,.15),inset 0 1px 0 rgba(255,255,255,.06);
        }
        .tab-btn.t-active-jadwal i{color:var(--bl)}
        .tab-btn.t-active-prediksi{
            background:linear-gradient(135deg,var(--yld2),var(--yld));
            color:var(--yl);box-shadow:0 4px 20px var(--ylg),inset 0 1px 0 rgba(255,255,255,.06);
        }
        .tab-btn.t-active-prediksi i{color:var(--yl)}
        .tab-cnt{
            display:inline-flex;align-items:center;justify-content:center;
            min-width:24px;height:19px;border-radius:50px;
            font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;
            padding:0 7px;transition:all .35s;
        }
        .tab-btn.t-active-jadwal .tab-cnt{background:var(--bl);color:#fff}
        .tab-btn.t-active-prediksi .tab-cnt{background:var(--yl);color:var(--bg)}
        .tab-btn:not(.t-active-jadwal):not(.t-active-prediksi) .tab-cnt{background:var(--bg3);color:var(--fm)}

        .tab-content{display:none;animation:tfu .4s ease-out both}
        .tab-content.active{display:block}
        @keyframes tfu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        /* ===== SEARCH ===== */
        .sbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
        .stotal{font-size:12px;font-weight:600;color:var(--fg2)}
        .stotal strong{font-size:20px;font-weight:900}
        .c-bl{color:var(--bl)}.c-yl{color:var(--yl)}
        .sb{display:flex;align-items:center;gap:7px;background:var(--card);border:2px solid var(--brd2);border-radius:50px;padding:6px 14px;transition:border-color .25s}
        .sb:focus-within{border-color:var(--yl)}
        .sb i{color:var(--fm);font-size:11px}
        .sb input{background:none;border:none;outline:none;color:var(--fg);font-family:'Outfit',sans-serif;font-size:12px;width:150px}
        .sb input::placeholder{color:var(--fm2)}

        /* ===== DEDUP INFO ===== */
        .dedup-info{display:flex;align-items:center;gap:6px;padding:6px 12px;margin-bottom:12px;background:var(--yld);border:1px solid rgba(245,197,24,.1);border-radius:8px;font-size:10px;color:var(--fm);font-weight:500}
        .dedup-info i{color:var(--yl);font-size:11px}.dedup-info strong{color:var(--yl)}

        /* ===== TABLE WRAPPER ===== */
        .tw{background:var(--card);border:2px solid var(--brd2);border-radius:14px;overflow:hidden;margin-bottom:22px;animation:fu .4s ease-out both}
        @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        /* ===== DATE HEADER ===== */
        .dhd{
            display:flex;align-items:center;gap:10px;
            padding:10px 18px;
            background:linear-gradient(135deg,var(--bg3),var(--card2));
            border-bottom:1px solid var(--brd2);
            position:relative;
        }
        .dhd::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--yl3),transparent)}
        .dhd-ic{font-size:14px;color:var(--yl)}
        .dhd-txt{font-size:12px;font-weight:800;color:var(--yl2);letter-spacing:.3px}
        .dhd-day{font-size:10px;font-weight:600;color:var(--fm);margin-left:auto}

        /* ===== LIGA HEADER ===== */
        .lhd{display:flex;align-items:center;gap:12px;padding:14px 18px;position:relative;overflow:hidden}
        .lhd::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:0 4px 4px 0}
        .lhd.lh-bl{background:linear-gradient(135deg,var(--card2),rgba(59,142,245,.03));border-bottom:2px solid rgba(59,142,245,.12)}
        .lhd.lh-bl::before{background:linear-gradient(180deg,var(--bl),var(--bl3))}
        .lhd.lh-yl{background:linear-gradient(135deg,var(--card2),rgba(245,197,24,.03));border-bottom:2px solid rgba(245,197,24,.12)}
        .lhd.lh-yl::before{background:linear-gradient(180deg,var(--yl),var(--yl3))}
        .lic{width:38px;height:38px;border-radius:9px;background:var(--bg3);border:2px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .linf{flex:1}
        .lnm{font-size:15px;font-weight:900;letter-spacing:-.3px}
        .lnm.nm-bl{color:var(--bl2)}.lnm.nm-yl{color:var(--yl2)}
        .lco{font-size:10px;color:var(--fm);font-weight:500;margin-top:1px}
        .lcnt{font-size:9px;font-weight:800;padding:4px 11px;border-radius:50px;letter-spacing:.3px}
        .lcnt.ct-bl{background:var(--bld2);color:var(--bl);border:1px solid rgba(59,142,245,.18)}
        .lcnt.ct-yl{background:var(--yld2);color:var(--yl);border:1px solid rgba(245,197,24,.15)}

        /* ===== TABLE ===== */
        table.pt{width:100%;border-collapse:collapse}
        table.pt thead th{
            padding:11px 16px;text-align:center;
            font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.4px;
            background:var(--bg3);white-space:nowrap;
        }
        table.pt.th-bl thead th{color:var(--bl);border-bottom:2px solid rgba(59,142,245,.25)}
        table.pt.th-yl thead th{color:var(--yl);border-bottom:2px solid rgba(245,197,24,.25)}

        /* Jadwal: 5 kolom */
        table.pt.jadwal thead th:nth-child(1){width:48px}
        table.pt.jadwal thead th:nth-child(2){width:84px}
        table.pt.jadwal thead th:nth-child(3){text-align:right;padding-right:24px}
        table.pt.jadwal thead th:nth-child(4){width:56px}
        table.pt.jadwal thead th:nth-child(5){text-align:left;padding-left:24px}

        /* Prediksi: 6 kolom */
        table.pt.prediksi thead th:nth-child(1){width:48px}
        table.pt.prediksi thead th:nth-child(2){width:84px}
        table.pt.prediksi thead th:nth-child(3){text-align:right;padding-right:24px}
        table.pt.prediksi thead th:nth-child(4){width:56px}
        table.pt.prediksi thead th:nth-child(5){text-align:left;padding-left:24px}
        table.pt.prediksi thead th:nth-child(6){width:110px}

        table.pt tbody tr{transition:all .15s;border-bottom:1px solid var(--brd)}
        table.pt tbody tr:last-child{border-bottom:none}
        table.pt tbody tr:hover{background:var(--card2)}
        table.pt tbody tr:nth-child(even){background:rgba(245,197,24,.008)}
        table.pt tbody tr:nth-child(even):hover{background:var(--card2)}

        table.pt tbody td{padding:13px 16px;text-align:center;vertical-align:middle}

        .cn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
        .cn-bl{color:var(--bl3)}.cn-yl{color:var(--yl3)}
        .ct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap}
        .ct-bl{color:var(--bl)}.ct-yl{color:var(--yl)}

        .ctm{white-space:nowrap}
        .tmr{display:flex;align-items:center;gap:9px}
        .tmr.h{justify-content:flex-end}
        .tmr.a{justify-content:flex-start}
        .tmi{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
        .tmi-bl{background:rgba(59,142,245,.08);border:1px solid rgba(59,142,245,.15);color:var(--bl3)}
        .tmi-yl{background:var(--yld);border:1px solid rgba(245,197,24,.15);color:var(--yl3)}
        .tmn{font-size:13px;font-weight:800;color:var(--fg);letter-spacing:-.2px}

        .cv{text-align:center!important}
        .vsb{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;letter-spacing:.4px}
        .vsb-bl{background:rgba(59,142,245,.06);border:2px solid rgba(59,142,245,.2);color:var(--bl)}
        .vsb-yl{background:var(--yld);border:2px solid rgba(245,197,24,.2);color:var(--yl)}

        /* ===== SKOR PREDIKSI ===== */
        .cs{text-align:center!important}
        .sk-wrap{
            display:inline-flex;align-items:stretch;
            border-radius:10px;overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.3),0 0 20px rgba(245,197,24,.06);
        }
        .sk-num{
            font-family:'JetBrains Mono',monospace;
            font-size:22px;font-weight:900;color:var(--bg);
            width:42px;display:flex;align-items:center;justify-content:center;
            line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.2);
        }
        .sk-num.left{background:linear-gradient(180deg,var(--yl2),var(--yl3))}
        .sk-num.right{background:linear-gradient(180deg,var(--yl2),var(--yl3))}
        .sk-sep{
            font-family:'JetBrains Mono',monospace;
            font-size:13px;font-weight:900;color:var(--bg);
            background:linear-gradient(180deg,var(--yl3),#9a7808);
            width:18px;display:flex;align-items:center;justify-content:center;line-height:1;
        }

        @keyframes nr{0%{background:rgba(245,197,24,.08)}100%{background:transparent}}
        .nrow{animation:nr 2.5s ease-out}

        .lbx{display:flex;flex-direction:column;align-items:center;padding:50px 20px;gap:14px}
        .lsp{width:40px;height:40px;border:3px solid var(--brd2);border-top-color:var(--yl);border-radius:50%;animation:sp .7s linear infinite}
        @keyframes sp{100%{transform:rotate(360deg)}}
        .ltx{color:var(--fm);font-size:12px;font-weight:500}

        .mbx{text-align:center;padding:44px 20px}
        .mbx i{font-size:40px;margin-bottom:12px;color:var(--yl3);display:block}
        .mbx h3{font-size:16px;font-weight:800;margin-bottom:5px}
        .mbx p{color:var(--fm);font-size:12px;margin-bottom:14px}
        .mbx button{padding:9px 20px;border-radius:50px;border:none;background:var(--yl);color:var(--bg);font-family:'Outfit',sans-serif;font-weight:900;font-size:12px;cursor:pointer;transition:transform .2s,box-shadow .2s}
        .mbx button:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--ylg)}

        .tc{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px}
        .ts{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--card2);border:2px solid var(--brd2);border-radius:9px;font-size:10px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:si .3s ease-out;max-width:260px;font-weight:600}
        .ts.ok{border-left:4px solid var(--yl)}.ts.er{border-left:4px solid var(--rd)}.ts.inf{border-left:4px solid var(--gy)}.ts.upd{border-left:4px solid var(--gn)}
        @keyframes si{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

        footer{text-align:center;padding:24px 14px;color:var(--fm2);font-size:9px;border-top:1px solid var(--brd2);margin-top:24px;font-weight:600;letter-spacing:.3px}
        footer a{color:var(--yl);text-decoration:none;font-weight:800}

        @media(max-width:640px){
            .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
            table.pt{min-width:560px}
            .tab-btn{padding:11px 10px;font-size:12px;gap:6px}
            .sk-num{width:36px;font-size:18px}
            .sk-sep{width:16px;font-size:11px}
            .logo-wrap img{height:56px}
        }
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:var(--bg)}
        ::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
        ::-webkit-scrollbar-thumb:hover{background:var(--brd3)}
    </style>
</head>

<div class="atm"><div class="orb o1"></div><div class="orb o2"></div></div>
<canvas id="ballCanvas"></canvas>
<div class="grain"></div>

<div class="wrap">
    <header>
        <div class="logo-wrap">
            <img src="https://i.postimg.cc/pdfn3Dpc/MARKASWD.png" alt="MARKASWD">
        </div>
        <div class="hbadge"><span class="pd"></span> Live Data</div>

    <div class="tab-wrap">
        <div class="tab-bar">
            <button class="tab-btn t-active-jadwal" id="tabJadwal" onclick="switchTab('jadwal')">
                <i class="fas fa-calendar-days"></i>
                <span>Jadwal Bola</span>

</div>

<script>
/* ===== EFEK BOLA JATUH ===== */
(function(){
    const canvas=document.getElementById('ballCanvas');
    if(!canvas)return;
    const ctx=canvas.getContext('2d');

    function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
    resize();
    window.addEventListener('resize',resize);

    /* Pre-render tekstur bola ke offscreen canvas */
    const BS=64;
    const offC=document.createElement('canvas');
    offC.width=BS;offC.height=BS;
    const oCtx=offC.getContext('2d');

    (function drawBallTexture(){
        const cx=BS/2,cy=BS/2,r=BS*.4;
        /* Body bola dengan gradient emas */
        const grad=oCtx.createRadialGradient(cx-r*.3,cy-r*.3,0,cx,cy,r);
        grad.addColorStop(0,'#f0e4b8');
        grad.addColorStop(0.5,'#c8b070');
        grad.addColorStop(1,'#7a6838');
        oCtx.beginPath();oCtx.arc(cx,cy,r,0,Math.PI*2);
        oCtx.fillStyle=grad;oCtx.fill();
        oCtx.strokeStyle='#5a4a28';oCtx.lineWidth=1;oCtx.stroke();

        /* Pentagon tengah */
        const pr=r*.32;
        oCtx.beginPath();
        for(let i=0;i<5;i++){const a=(i*Math.PI*2/5)-Math.PI/2;const px=cx+Math.cos(a)*pr,py=cy+Math.sin(a)*pr;i===0?oCtx.moveTo(px,py):oCtx.lineTo(px,py)}
        oCtx.closePath();oCtx.fillStyle='#302818';oCtx.fill();

        /* Garis dari pentagon ke tepi */
        oCtx.strokeStyle='rgba(90,74,40,0.6)';oCtx.lineWidth=.8;
        for(let i=0;i<5;i++){const a=(i*Math.PI*2/5)-Math.PI/2;oCtx.beginPath();oCtx.moveTo(cx+Math.cos(a)*pr,cy+Math.sin(a)*pr);oCtx.lineTo(cx+Math.cos(a)*r*.85,cy+Math.sin(a)*r*.85);oCtx.stroke()}

        /* Highlight atas */
        const hg=oCtx.createRadialGradient(cx-r*.2,cy-r*.25,0,cx-r*.2,cy-r*.25,r*.35);
        hg.addColorStop(0,'rgba(255,255,240,0.25)');hg.addColorStop(1,'rgba(255,255,240,0)');
        oCtx.beginPath();oCtx.arc(cx,cy,r,0,Math.PI*2);oCtx.fillStyle=hg;oCtx.fill();
    })();

    /* Partikel bola */
    const balls=[];
    const COUNT=24;
    const prefersReduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    class SoccerBall{
        constructor(init){this.reset(init)}
        reset(init){
            this.x=Math.random()*(canvas.width||window.innerWidth);
            this.y=init?Math.random()*(canvas.height||window.innerHeight):-(20+Math.random()*60);
            this.size=10+Math.random()*18;
            this.vy=.25+Math.random()*1.1;
            this.swayAmp=.15+Math.random()*.55;
            this.swayFreq=.002+Math.random()*.007;
            this.rot=Math.random()*Math.PI*2;

        }
        draw(c){
            c.save();

            c.translate(this.x,this.y);
            c.rotate(this.rot);
            c.drawImage(offC,-this.size/2,-this.size/2,this.size,this.size);
            c.restore();
        }
    }

    for(let i=0;i<COUNT;i++)balls.push(new SoccerBall(true));

};
const DAYS_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

function detectDateStr(text){
    if(!text)return null;
    let m=text.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if(m){const mon=MONTHS_ID[m[2].toLowerCase()];if(mon!==undefined)return{day:parseInt(m[1]),month:mon,year:parseInt(m[3])}}
    m=text.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(m)return{day:parseInt(m[3]),month:parseInt(m[2])-1,year:parseInt(m[1])};
    m=text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(m)return{day:parseInt(m[1]),month:parseInt(m[2])-1,year:parseInt(m[3])};
    m=text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(m&&parseInt(m[1])>12)return{day:parseInt(m[2]),month:parseInt(m[1])-1,year:parseInt(m[3])};
    return null;
}
function fmtDate(d){if(!d)return'';return`${d.year}-${String(d.month+1).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`}
function fmtDateDisplay(dateStr){
    if(!dateStr)return'';const parts=dateStr.split('-');if(parts.length!==3)return dateStr;
    const y=parseInt(parts[0]),mo=parseInt(parts[1])-1,d=parseInt(parts[2]);
    const dt=new Date(y,mo,d);const dayName=DAYS_ID[dt.getDay()];
    const monNames=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return`${dayName}, ${d} ${monNames[mo]} ${y}`;
}
function isToday(dateStr){if(!dateStr)return false;const now=new Date();const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;return dateStr===todayStr}
function isTomorrow(dateStr){if(!dateStr)return false;const tom=new Date();tom.setDate(tom.getDate()+1);const tomStr=`${tom.getFullYear()}-${String(tom.getMonth()+1).padStart(2,'0')}-${String(tom.getDate()).padStart(2,'0')}`;return dateStr===tomStr}

function dedup(data){

}

function renderJadwal(data,isNew){
    const mn=document.getElementById('mnJadwal');
    const sq=document.getElementById('sIn').value.toLowerCase();
    let f=data;if(sq)f=f.filter(x=>x.home.toLowerCase().includes(sq)||x.away.toLowerCase().includes(sq)||x.league.toLowerCase().includes(sq));
    if(!f.length){mn.innerHTML=`<div class="mbx"><i class="fas fa-calendar-xmark"></i><h3>Tidak ada jadwal</h3><p>Coba kata kunci lain</p><button onclick="document.getElementById('sIn').value='';renderAll()">Reset</button></div>`;return}

    const dateGrp={};
    f.forEach(x=>{const dk=x.matchDate||'nodate';if(!dateGrp[dk])dateGrp[dk]={};if(!dateGrp[dk][x.league])dateGrp[dk][x.league]=[];dateGrp[dk][x.league].push(x)});
    const sortedDates=Object.keys(dateGrp).sort();

    let html='',dl=0;
    sortedDates.forEach(dateKey=>{
        if(dateKey!=='nodate'){
            const dayLabel=getDayLabel(dateKey);const fullLabel=fmtDateDisplay(dateKey);
            html+=`<div class="dhd" style="animation-delay:${dl}ms"><i class="fas fa-calendar-day dhd-ic"></i><span class="dhd-txt">${fullLabel}</span><span class="dhd-day">${dayLabel}</span></div>`;
            dl+=20;
        }
        const leagues=dateGrp[dateKey];
        for(const[league,matches]of Object.entries(leagues)){
            const m=gLM(league);
            html+=`<div class="tw" style="animation-delay:${dl}ms">
                <div class="lhd lh-bl"><div class="lic">${m.ic}</div><div class="linf"><div class="lnm nm-bl">${league}</div><div class="lco">${m.co}</div></div><div class="lcnt ct-bl">${matches.length} jadwal</div></div>
                <table class="pt th-bl jadwal"><thead><tr>
                    <th>No</th><th>Waktu</th><th style="text-align:right">Home</th><th>VS</th><th style="text-align:left">Away</th>
                </tr></thead><tbody>`;
            matches.forEach((d,i)=>{
                html+=`<tr class="${isNew?'nrow':''}">
                    <td class="cn cn-bl">${String(i+1).padStart(2,'0')}</td>
                    <td class="ct ct-bl">${d.time||'--:--'}</td>
                    <td class="ctm" style="text-align:right"><div class="tmr h"><span class="tmn">${d.home}</span><span class="tmi tmi-bl"><i class="fas fa-shield-halved"></i></span></div></td>
                    <td class="cv"><span class="vsb vsb-bl">VS</span></td>
                    <td class="ctm" style="text-align:left"><div class="tmr a"><span class="tmi tmi-bl"><i class="fas fa-shield-halved"></i></span><span class="tmn">${d.away}</span></div></td>
                </tr>`;
            });
            html+=`</tbody></table></div>`;dl+=40;
        }
    });
    mn.innerHTML=html;
}

/* ===== RENDER PREDIKSI ===== */
function renderPrediksi(data,isNew){
    const mn=document.getElementById('mnPrediksi');
    const sq=document.getElementById('sIn').value.toLowerCase();
    let f=data;if(sq)f=f.filter(x=>x.home.toLowerCase().includes(sq)||x.away.toLowerCase().includes(sq)||x.league.toLowerCase().includes(sq));
    if(!f.length){mn.innerHTML=`<div class="mbx"><i class="fas fa-chart-line"></i><h3>Tidak ada prediksi</h3><p>Coba kata kunci lain</p><button onclick="document.getElementById('sIn').value='';renderAll()">Reset</button></div>`;return}

    const dateGrp={};
    f.forEach(x=>{const dk=x.matchDate||'nodate';if(!dateGrp[dk])dateGrp[dk]={};if(!dateGrp[dk][x.league])dateGrp[dk][x.league]=[];dateGrp[dk][x.league].push(x)});
    const sortedDates=Object.keys(dateGrp).sort();

    let html='',dl=0;
    sortedDates.forEach(dateKey=>{
        if(dateKey!=='nodate'){
            const dayLabel=getDayLabel(dateKey);const fullLabel=fmtDateDisplay(dateKey);
            html+=`<div class="dhd" style="animation-delay:${dl}ms"><i class="fas fa-calendar-day dhd-ic"></i><span class="dhd-txt">${fullLabel}</span><span class="dhd-day">${dayLabel}</span></div>`;
            dl+=20;
        }
        const leagues=dateGrp[dateKey];
        for(const[league,matches]of Object.entries(leagues)){
            const m=gLM(league);
            html+=`<div class="tw" style="animation-delay:${dl}ms">
                <div class="lhd lh-yl"><div class="lic">${m.ic}</div><div class="linf"><div class="lnm nm-yl">${league}</div><div class="lco">${m.co}</div></div><div class="lcnt ct-yl">${matches.length} prediksi</div></div>
                <table class="pt th-yl prediksi"><thead><tr>
                    <th>No</th><th>Waktu</th><th style="text-align:right">Home</th><th>VS</th><th style="text-align:left">Away</th><th>Skor</th>
                </tr></thead><tbody>`;
            matches.forEach((d,i)=>{
                const sc=parseScore(d.predScore);
                html+=`<tr class="${isNew?'nrow':''}">
                    <td class="cn cn-yl">${String(i+1).padStart(2,'0')}</td>
                    <td class="ct ct-yl">${d.time||'--:--'}</td>
                    <td class="ctm" style="text-align:right"><div class="tmr h"><span class="tmn">${d.home}</span><span class="tmi tmi-yl"><i class="fas fa-shield-halved"></i></span></div></td>
                    <td class="cv"><span class="vsb vsb-yl">VS</span></td>
                    <td class="ctm" style="text-align:left"><div class="tmr a"><span class="tmi tmi-yl"><i class="fas fa-shield-halved"></i></span><span class="tmn">${d.away}</span></div></td>
                    <td class="cs"><div class="sk-wrap"><span class="sk-num left">${sc.h}</span><span class="sk-sep">-</span><span class="sk-num right">${sc.a}</span></div></td>
                </tr>`;
            });
            html+=`</tbody></table></div>`;dl+=40;
        }
    });
    mn.innerHTML=html;
}

function renderAll(isNew){
    renderJadwal(jadwalData,isNew);renderPrediksi(prediksiData,isNew);
    updateLabels();
    document.getElementById('cntJadwal').textContent=jadwalData.length;
    document.getElementById('cntPrediksi').textContent=prediksiData.length;
}

/* Auto-refresh */
function startCD(){if(cdT)clearInterval(cdT);cd=INT;cdT=setInterval(()=>{cd--;if(cd<=0){clearInterval(cdT);loadData()}},1000)}

/* ===== MAIN LOAD ===== */
async function loadData(){
    const mnJ=document.getElementById('mnJadwal'),mnP=document.getElementById('mnPrediksi');
    if(!jadwalData.length&&!prediksiData.length){
        mnJ.innerHTML='<div class="lbx"><div class="lsp"></div><div class="ltx">Mengambil jadwal...</div></div>';
        mnP.innerHTML='<div class="lbx"><div class="lsp"></div><div class="ltx">Mengambil prediksi...</div></div>';
    }

    const html=await fetchPage();let gotData=false;

    if(html){
        const parsed=parseHTML(html);
        if(parsed.jadwal.length){const structured=structJadwal(parsed.jadwal);const{cleaned,dups}=dedup(structured);jadwalData=cleaned;dupCountJ=dups}
        if(parsed.prediksi.length){const structured=structPrediksi(parsed.prediksi);const{cleaned,dups}=dedup(structured);prediksiData=cleaned;dupCountP=dups}

        if(jadwalData.length||prediksiData.length){
            gotData=true;
            const totalDups=dupCountJ+dupCountP;const dedupEl=document.getElementById('dedupInfo');
            if(totalDups>0){document.getElementById('dedupCount').textContent=totalDups;dedupEl.style.display='flex'}else dedupEl.style.display='none';

            const nhJ=hashD(jadwalData),nhP=hashD(prediksiData);
            const changedJ=nhJ!==prevHJ&&prevHJ!=='';const changedP=nhP!==prevHP&&prevHP!=='';
            if(changedJ||changedP){toast('Data diperbarui!','upd');renderAll(true)}
            else if(!prevHJ&&!prevHP){toast(`${jadwalData.length} jadwal, ${prediksiData.length} prediksi dimuat`,'ok');renderAll(true)}
            prevHJ=nhJ;prevHP=nhP;
        }
    }

    if(!gotData){
        if(!jadwalData.length&&!prediksiData.length){
            jadwalData=fallbackJadwal();prediksiData=fallbackPrediksi();
            const r1=dedup(jadwalData);jadwalData=r1.cleaned;dupCountJ=r1.dups;
            const r2=dedup(prediksiData);prediksiData=r2.cleaned;dupCountP=r2.dups;
            renderAll(true);toast('Gagal terhubung, data sampel','er');
        }
        document.getElementById('dedupInfo').style.display='none';
    }

    updateLabels();
    document.getElementById('cntJadwal').textContent=jadwalData.length;
    document.getElementById('cntPrediksi').textContent=prediksiData.length;
    startCD();
}

document.getElementById('sIn').addEventListener('input',()=>renderAll(false));
loadData();
</script>
</body>
</html>
